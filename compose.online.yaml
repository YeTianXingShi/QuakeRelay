# QuakeRelay 在线镜像部署文件
#
# 使用前必须替换：
#   1. QUAKERELAY_SECRET_KEY
#   2. QUAKERELAY_AMAP_JS_KEY
#   3. QUAKERELAY_AMAP_SECURITY_CODE
#   4. QUAKERELAY_PUBLIC_BASE_URL
#
# 生成 Fernet 密钥：
#   docker run --rm python:3.12-slim sh -c "pip install -q cryptography && python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'"

services:
  quakerelay:
    image: ghcr.io/yetianxingshi/quakerelay:latest
    container_name: quakerelay
    restart: unless-stopped
    ports:
      # 仅监听本机，建议通过带 HTTPS 和访问控制的反向代理对外提供服务。
      - "127.0.0.1:8080:8080"
    environment:
      QUAKERELAY_DATABASE_URL: "sqlite:////data/quakerelay.db"
      QUAKERELAY_SECRET_KEY: "请替换为你生成的-Fernet-密钥"
      QUAKERELAY_AMAP_JS_KEY: "请替换为高德地图-JS-API-Key"
      QUAKERELAY_AMAP_SECURITY_CODE: "请替换为高德地图安全密钥"
      QUAKERELAY_PUBLIC_BASE_URL: "https://quake.example.com"
      QUAKERELAY_LOG_LEVEL: "INFO"
      QUAKERELAY_ENABLE_COLLECTOR: "true"
      QUAKERELAY_DATA_DIR: "/data"
      QUAKERELAY_RECOVERY_WINDOW_HOURS: "24"
      QUAKERELAY_SOURCE_DOWN_MINUTES: "10"
    volumes:
      # 数据库和备份直接保存到当前目录的 ./data。
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
